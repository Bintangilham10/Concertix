# SonarQube Configuration for Concertix
sonar.projectKey=concertix
sonar.projectName=Concertix - Concert Ticketing Platform
sonar.projectVersion=0.1.0

# Source directories
sonar.sources=backend/app,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/venv/**,**/__pycache__/**,**/migrations/**

# Python settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/reports/coverage.xml

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
