services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: concertix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env and set it.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set it.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set it.}
    # T5 Mitigation: Port NOT exposed to host — internal Docker network only
    # ports:
    #   - "5432:5432"  # REMOVED for security
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - concertix-net

  # ── Redis (Token Blacklist / Caching) ──
  redis:
    image: redis:7-alpine
    container_name: concertix-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - concertix-net

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: concertix-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required. Copy .env.example to .env and set it.}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-true}
      EXPOSE_METRICS: ${EXPOSE_METRICS:-true}
      TOKEN_BLACKLIST_FAIL_CLOSED: ${TOKEN_BLACKLIST_FAIL_CLOSED:-false}
      RATE_LIMIT_STORAGE_URL: ${RATE_LIMIT_STORAGE_URL:-redis://redis:6379/0}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required. Copy .env.example to .env and set it.}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      PASSWORD_RESET_OTP_EXPIRE_MINUTES: ${PASSWORD_RESET_OTP_EXPIRE_MINUTES:-10}
      PASSWORD_RESET_OTP_MAX_ATTEMPTS: ${PASSWORD_RESET_OTP_MAX_ATTEMPTS:-5}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "python -m scripts.init_demo && uvicorn app.main:app --host 0.0.0.0 --port $${PORT:-8000}"
    networks:
      - concertix-net

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${NEXT_PUBLIC_MIDTRANS_CLIENT_KEY:-}
    container_name: concertix-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - concertix-net

  # ══════════════════════════════════════════════════════════════
  # ── Monitoring Stack (Week 2) ──
  # ══════════════════════════════════════════════════════════════

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: concertix-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - backend
    networks:
      - concertix-net

  # ── Grafana ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: concertix-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required. Copy .env.example to .env and set it.}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - concertix-net

  # ── cAdvisor (Container Metrics) ──
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: concertix-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - concertix-net

  # ══════════════════════════════════════════════════════════════
  # ── Security Scanning (CI only, optional for local) ──
  # ══════════════════════════════════════════════════════════════

  # ── SonarQube (SAST) ──
  sonarqube:
    image: sonarqube:10.4-community
    container_name: concertix-sonarqube
    restart: unless-stopped
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ports:
      - "127.0.0.1:9000:9000"
    profiles:
      - security  # Only start with: docker-compose --profile security up
    networks:
      - concertix-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  concertix-net:
    driver: bridge
