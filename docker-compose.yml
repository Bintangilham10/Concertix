version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: concertix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-concertix}
      POSTGRES_USER: ${POSTGRES_USER:-concertix_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concertix_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concertix_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: concertix-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: concertix-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
