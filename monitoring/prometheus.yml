global:
  scrape_interval: 15s       # Scrape every 15 seconds
  evaluation_interval: 15s   # Evaluate rules every 15 seconds
  scrape_timeout: 10s

# Alertmanager configuration (optional — add later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load alerting rules (optional)
# rule_files:
#   - "alert_rules.yml"

scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── FastAPI Backend Metrics (T4 Monitoring) ──────────────────────
  # Exposed by prometheus-fastapi-instrumentator at /metrics
  - job_name: 'concertix-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 10s

  # ── cAdvisor — Docker Container Metrics ─────────────────────────
  - job_name: 'cadvisor'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 20s

  # ── Node Exporter (optional — add node-exporter service if needed)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
